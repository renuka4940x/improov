# --- CREATE USER PROFILE (SECURED) ---
mutation CreateUser(
  $username: String!,
  $email: String!,
  $passwordHash: String!,
  $createdAt: Timestamp!
) @auth(level: USER) {
  user_insert(data: {
    id_expr: "auth.uid",
    username: $username,
    email: $email,
    passwordHash: $passwordHash,
    createdAt: $createdAt
  })
}

query GetMyHabits @auth(level: USER) {
  habits(
    where: {
      userId: {eq_expr: "auth.uid"}
    }
  ) {
    id
    name
    description
    goalDaysPerWeek
    reminderTime
    startDate
  }
}

# --- CREATE HABIT ---
mutation CreateHabit(
  $id: String!,
  $name: String!, 
  $description: String!,
  $isHabitMode: Boolean!,
  $startDate: Timestamp!,
  $goalDaysPerWeek: Int!,
  $priority: String!,
  $colorHex: Float!,
  $isArchived: Boolean!
) @auth(level: USER) {
  habit_insert(data: {
    id: $id,
    userId_expr: "auth.uid",
    name: $name,
    description: $description,
    isHabitMode: $isHabitMode,
    startDate: $startDate,
    goalDaysPerWeek: $goalDaysPerWeek,
    priority: $priority,
    colorHex: $colorHex,
    isArchived: $isArchived
  }) 
}

# --- UPDATE HABIT ---
mutation UpdateHabit(
  $id: String!,
  $name: String!, 
  $description: String!,
  $goalDaysPerWeek: Int!,
  $priority: String!,
  $colorHex: Float!
) @auth(level: USER) {
  habit_updateMany(
    where: { 
      id: { eq: $id }, 
      userId: { eq_expr: "auth.uid" } 
    }, 
    data: {
      name: $name,
      description: $description,
      goalDaysPerWeek: $goalDaysPerWeek,
      priority: $priority,
      colorHex: $colorHex
    }
  )
}

# --- UPDATE COMPLETION & STREAKS ---
mutation UpdateHabitCompletion(
  $id: String!,
  $currentStreak: Int!,
  $bestStreak: Int!,
  $completedDays: [String!]!
) @auth(level: USER) {
  habit_updateMany(
    where: { 
      id: { eq: $id }, 
      userId: { eq_expr: "auth.uid" } 
    }, 
    data: {
      currentStreak: $currentStreak,
      bestStreak: $bestStreak,
      completedDays: $completedDays
    }
  )
}

# --- DELETE HABIT ---
mutation DeleteHabit($id: String!) @auth(level: USER) {
  habit_deleteMany(
    where: { 
      id: { eq: $id }, 
      userId: { eq_expr: "auth.uid" } 
    }
  )
}

# --- CREATE TASK ---
mutation CreateTask(
  $id: String!,
  $name: String!, 
  $description: String!,
  $dueDate: Timestamp!,
  $isCompleted: Boolean!,
  $createdAt: Timestamp!,
  $priority: String!
) @auth(level: USER) {
  task_insert(data: {
    id: $id,
    userId_expr: "auth.uid",
    name: $name,
    description: $description,
    dueDate: $dueDate,
    isCompleted: $isCompleted,
    createdAt: $createdAt,
    priority: $priority
  }) 
}

