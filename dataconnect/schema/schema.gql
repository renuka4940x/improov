type User @table(key: "id") {
  id: String! @col(name: "user_id")
  username: String!
  email: String!
  passwordHash: String!
  createdAt: Timestamp!
}

type Habit @table(key: "id") {
  id: String!
  userId: String!
  
  name: String!
  description: String!
  isHabitMode: Boolean!
  startDate: Timestamp!
  goalDaysPerWeek: Int!
  
  priority: String! 
  reminderTime: Timestamp
  isArchived: Boolean!
  colorHex: Float!

  currentStreak: Int
  bestStreak: Int
  completedDays: [String!]
}

type Task @table(key: "id") {
  id: String!
  userId: String!
  name: String!
  dueDate: Timestamp!
  isCompleted: Boolean!
  createdAt: Timestamp!
  description: String
  priority: String
}

